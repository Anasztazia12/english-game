<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ENjdO4Dr2bkBIFxQpeoA6DQD5l5/2Qp1Nn91p1ZV+zF5SRh5e5Z1F5F5F5F5F5F5" crossorigin="anonymous">
</head>
<body>
</body>
    <div class="container">
        <h1>English Game</h1>
        <div id="start-area">
            <button id="start-btn" class="btn btn-lg fw-bold text-uppercase" style="font-size:1.3rem; letter-spacing:1px; background: linear-gradient(90deg, #ffb347 0%, #ff6f61 100%); color: #fff; border: none; border-radius: 1.5rem; box-shadow: 0 4px 18px rgba(255,111,97,0.13); transition: transform 0.15s; padding: 0.9rem 2.2rem;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" onclick="showModeSelect()">
                <span style="font-family: 'Comic Sans MS', 'Comic Sans', cursive, Arial, sans-serif;">Start Game</span>
            </button>
        </div>
        <div id="mode-select" style="display:none;">
            <h2>Select Game Mode</h2>
            <button class="btn btn-success m-2" onclick="chooseMode('fill')">Fill in the blank</button>
            <button class="btn btn-info m-2" onclick="chooseMode('order')">Sentence order</button>
            <div class="mt-3">
                <button class="btn btn-secondary" onclick="goHome()">Home</button>
            </div>
        </div>
        <div id="difficulty-select" style="display:none;">
            <h2>Select Difficulty</h2>
            <button class="btn btn-warning m-2" onclick="chooseDifficulty('easy')" id="btn-easy">Easy</button>
            <button class="btn btn-danger m-2" onclick="chooseDifficulty('hard')" id="btn-hard">Hard</button>
            <div class="mt-3">
                <button class="btn btn-secondary me-2" onclick="backToMode()">Back</button>
                <button class="btn btn-secondary" onclick="goHome()">Home</button>
            </div>
        </div>
        <div id="game-area" style="display:none;"></div>
        <div id="game-nav" style="display:none;" class="mt-3">
            <button class="btn btn-secondary me-2" onclick="backToDifficulty()">Back</button>
            <button class="btn btn-secondary" onclick="goHome()">Home</button>
        </div>
        <div id="feedback"></div>
        <button id="next-btn" class="btn btn-primary mt-3" style="display:none;" onclick="nextQuestion()">Next</button>
        <!-- Sounds -->
        <audio id="audio-correct" src="correct.mp3" preload="auto"></audio>
        <audio id="audio-wrong" src="wrong.mp3" preload="auto"></audio>
    </div>
    <script>
    // Automatikus mondatgenerátor: egyszerű és nehezebb mondatok
    function generateFillQuestions(difficulty) {
        const subjects = ["I", "You", "He", "She", "We", "They", "My brother", "The dog", "Anna", "The children"];
        const verbs = [
            { base: "go", present: ["go", "goes"], ing: "going", past: "went" },
            { base: "eat", present: ["eat", "eats"], ing: "eating", past: "ate" },
            { base: "play", present: ["play", "plays"], ing: "playing", past: "played" },
            { base: "read", present: ["read", "reads"], ing: "reading", past: "read" },
            { base: "have", present: ["have", "has"], ing: "having", past: "had" },
            { base: "like", present: ["like", "likes"], ing: "liking", past: "liked" },
            { base: "see", present: ["see", "sees"], ing: "seeing", past: "saw" },
            { base: "make", present: ["make", "makes"], ing: "making", past: "made" },
            { base: "write", present: ["write", "writes"], ing: "writing", past: "wrote" },
            { base: "sing", present: ["sing", "sings"], ing: "singing", past: "sang" }
        ];
        const objects = ["a cake", "homework", "music", "a book", "breakfast", "a song", "the ball", "the piano", "a letter", "the park", "fast", "well", "every day", "yesterday", "now", "at school", "in the garden", "with friends", "in the morning"];
        const tenses = [
            { name: "present simple", template: (s, v, o) => `${s} ___ ${o}.`, options: v => v.present, answer: (s, v) => (["He","She","Anna","The dog","My brother"].includes(s) ? v.present[1] : v.present[0]) },
            { name: "present continuous", template: (s, v, o) => `${s} ___ ${v.ing} ${o}.`, options: v => ["am", "is", "are"], answer: (s) => (s === "I" ? "am" : (["He","She","Anna","The dog","My brother"].includes(s) ? "is" : "are")) },
            { name: "past simple", template: (s, v, o) => `${s} ___ ${o}.`, options: v => [v.past, v.base, v.present[0]], answer: (s, v) => v.past },
        ];
        let questions = [];
        // Easy: csak present simple, "to be" mondatok
        if (difficulty === 'easy') {
            for (let i = 0; i < 40; i++) {
                const subj = subjects[Math.floor(Math.random()*subjects.length)];
                const verb = verbs[Math.floor(Math.random()*verbs.length)];
                const obj = objects[Math.floor(Math.random()*objects.length)];
                questions.push({
                    sentence: `${subj} ___ ${obj}.`,
                    options: verb.present,
                    answer: (["He","She","Anna","The dog","My brother"].includes(subj) ? verb.present[1] : verb.present[0])
                });
            }
            const beSubjects = ["I", "You", "He", "She", "We", "They", "It"];
            const beComplements = ["happy", "sad", "hungry", "at home", "in the park", "a teacher", "students", "my friend", "tired", "tall", "ready", "here", "late", "early"];
            for (let i = 0; i < 20; i++) {
                const s = beSubjects[Math.floor(Math.random()*beSubjects.length)];
                const c = beComplements[Math.floor(Math.random()*beComplements.length)];
                questions.push({
                    sentence: `${s} ___ ${c}.`,
                    options: ["am", "is", "are"],
                    answer: (s === "I" ? "am" : (s === "He" || s === "She" || s === "It" ? "is" : "are"))
                });
            }
        } else {
            // Hard: mindenféle igeidő, tagadó, kérdő
            for (let i = 0; i < 50; i++) {
                const subj = subjects[Math.floor(Math.random()*subjects.length)];
                const verb = verbs[Math.floor(Math.random()*verbs.length)];
                const obj = objects[Math.floor(Math.random()*objects.length)];
                const tense = tenses[Math.floor(Math.random()*tenses.length)];
                questions.push({
                    sentence: tense.template(subj, verb, obj),
                    options: tense.options(verb),
                    answer: tense.answer(subj, verb)
                });
            }
            const beSubjects = ["I", "You", "He", "She", "We", "They", "It"];
            const beComplements = ["happy", "sad", "hungry", "at home", "in the park", "a teacher", "students", "my friend", "tired", "tall", "ready", "here", "late", "early"];
            for (let i = 0; i < 20; i++) {
                const s = beSubjects[Math.floor(Math.random()*beSubjects.length)];
                const c = beComplements[Math.floor(Math.random()*beComplements.length)];
                questions.push({
                    sentence: `${s} ___ ${c}.`,
                    options: ["am", "is", "are"],
                    answer: (s === "I" ? "am" : (s === "He" || s === "She" || s === "It" ? "is" : "are"))
                });
            }
            for (let i = 0; i < 20; i++) {
                const subj = subjects[Math.floor(Math.random()*subjects.length)];
                const verb = verbs[Math.floor(Math.random()*verbs.length)];
                const obj = objects[Math.floor(Math.random()*objects.length)];
                // Tagadó
                questions.push({
                    sentence: `${subj} ___ not ${verb.base} ${obj}.`,
                    options: ["do", "does", "did"],
                    answer: (["He","She","Anna","The dog","My brother"].includes(subj) ? "does" : "do")
                });
                // Kérdő
                questions.push({
                    sentence: `___ ${subj.toLowerCase()} ${verb.base} ${obj}?`,
                    options: ["Do", "Does", "Did"],
                    answer: (["He","She","Anna","The dog","My brother"].includes(subj) ? "Does" : "Do")
                });
            }
        }
        return questions;
    }

    function generateOrderQuestions(difficulty) {
        const subjects = ["I", "You", "He", "She", "We", "They", "My brother", "The dog", "Anna", "The children"];
        const verbs = ["like", "play", "eat", "read", "see", "make", "write", "sing", "have", "want", "love", "find", "watch", "open", "close", "draw", "run", "walk", "visit", "help"];
        const objects = ["apples", "music", "a book", "breakfast", "a song", "the ball", "the piano", "a letter", "the park", "the door", "the window", "the zoo", "the teacher", "the lesson", "the homework"];
        let questions = [];
        if (difficulty === 'easy') {
            for (let i = 0; i < 50; i++) {
                const s = subjects[Math.floor(Math.random()*subjects.length)];
                const v = verbs[Math.floor(Math.random()*verbs.length)];
                const o = objects[Math.floor(Math.random()*objects.length)];
                const sentence = `${s} ${v} ${o}.`;
                const words = sentence.replace('.', '').split(' ');
                questions.push({
                    words,
                    answer: sentence
                });
            }
        } else {
            for (let i = 0; i < 60; i++) {
                const s = subjects[Math.floor(Math.random()*subjects.length)];
                const v = verbs[Math.floor(Math.random()*verbs.length)];
                const o = objects[Math.floor(Math.random()*objects.length)];
                const sentence = `${s} ${v} ${o}.`;
                const words = sentence.replace('.', '').split(' ');
                questions.push({
                    words,
                    answer: sentence
                });
            }
            for (let i = 0; i < 20; i++) {
                const s = subjects[Math.floor(Math.random()*subjects.length)];
                const v = verbs[Math.floor(Math.random()*verbs.length)];
                const o = objects[Math.floor(Math.random()*objects.length)];
                // Kérdő
                const q1 = [`Do`, s.toLowerCase(), v, o.replace('.', ''), '?'];
                questions.push({
                    words: q1,
                    answer: `Do ${s.toLowerCase()} ${v} ${o.replace('.', '')}?`
                });
                // Tagadó
                const q2 = [s, "do", "not", v, o.replace('.', '')];
                questions.push({
                    words: q2,
                    answer: `${s} do not ${v} ${o.replace('.', '')}.`
                });
            }
        }
        return questions;
    }

    let difficulty = 'easy';
    let mode = 'fill';
    let fillQuestions = [];
    let orderQuestions = [];
    let current = 0;

    function showModeSelect() {
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('mode-select').style.display = '';
        document.getElementById('difficulty-select').style.display = 'none';
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('game-nav').style.display = 'none';
        document.getElementById('feedback').textContent = '';
        document.getElementById('next-btn').style.display = 'none';
    }

    function chooseMode(selectedMode) {
        mode = selectedMode;
        document.getElementById('mode-select').style.display = 'none';
        document.getElementById('difficulty-select').style.display = '';
        document.getElementById('game-nav').style.display = 'none';
        document.getElementById('feedback').textContent = '';
        document.getElementById('next-btn').style.display = 'none';
    }

    function chooseDifficulty(newDiff) {
        difficulty = newDiff;
        fillQuestions = generateFillQuestions(difficulty);
        orderQuestions = generateOrderQuestions(difficulty);
        current = 0;
        fillScore = 0;
        orderScore = 0;
        document.getElementById('difficulty-select').style.display = 'none';
        document.getElementById('game-area').style.display = '';
        document.getElementById('game-nav').style.display = '';
        document.getElementById('feedback').textContent = '';
        document.getElementById('next-btn').style.display = 'none';
        showQuestion();
        // Highlight selected button
        document.getElementById('btn-easy').style.background = (difficulty === 'easy') ? '#ffb347' : '';
        document.getElementById('btn-hard').style.background = (difficulty === 'hard') ? '#ffb347' : '';
    }

    function goHome() {
        document.getElementById('start-area').style.display = '';
        document.getElementById('mode-select').style.display = 'none';
        document.getElementById('difficulty-select').style.display = 'none';
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('game-nav').style.display = 'none';
        document.getElementById('feedback').textContent = '';
        document.getElementById('next-btn').style.display = 'none';
    }

    function backToMode() {
        document.getElementById('difficulty-select').style.display = 'none';
        document.getElementById('mode-select').style.display = '';
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('game-nav').style.display = 'none';
        document.getElementById('feedback').textContent = '';
        document.getElementById('next-btn').style.display = 'none';
    }

    function backToDifficulty() {
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('game-nav').style.display = 'none';
        document.getElementById('difficulty-select').style.display = '';
        document.getElementById('feedback').textContent = '';
        document.getElementById('next-btn').style.display = 'none';
    }

    // On load: only show start
    window.onload = () => {
        goHome();
    };



    function showQuestion() {
        const area = document.getElementById('game-area');
        area.innerHTML = '';
        if (mode === 'fill') {
            const q = fillQuestions[current];
            const sentence = q.sentence.replace('___', '<span id="blank"></span>');
            area.innerHTML = `<p>${sentence}</p>`;
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.className = 'btn btn-outline-primary m-2';
                btn.onclick = () => checkFillAnswer(opt);
                area.appendChild(btn);
            });
        } else if (mode === 'order') {
            const q = orderQuestions[current];
            const shuffled = [...q.words].sort(() => Math.random() - 0.5);
            area.innerHTML = '<div id="word-bank"></div><div id="sentence"></div>';
            const bank = document.getElementById('word-bank');
            shuffled.forEach(word => {
                const btn = document.createElement('button');
                btn.textContent = word;
                btn.className = 'btn btn-outline-success m-2';
                btn.onclick = () => pickWord(btn);
                bank.appendChild(btn);
            });
        }
    }

    function playSound(type) {
        const audio = document.getElementById(type === 'correct' ? 'audio-correct' : 'audio-wrong');
        if (audio) {
            audio.currentTime = 0;
            audio.play();
        }
    }

    let fillScore = 0;
    function checkFillAnswer(selected) {
        const q = fillQuestions[current];
        const feedback = document.getElementById('feedback');
        if (selected === q.answer) {
            feedback.textContent = 'Correct!';
            feedback.style.color = 'green';
            playSound('correct');
            fillScore++;
            document.getElementById('next-btn').style.display = (current < fillQuestions.length - 1) ? 'inline' : 'none';
            if (current === fillQuestions.length - 1) showFinalScore('fill');
        } else {
            feedback.textContent = 'Try again!';
            feedback.style.color = 'red';
            playSound('wrong');
            return;
        }
    }

    function pickWord(btn) {
        const sentenceDiv = document.getElementById('sentence');
        sentenceDiv.append(btn);
        btn.onclick = null;
        btn.style.margin = '0 4px';
        btn.classList.remove('btn-outline-success');
        btn.classList.add('btn-warning'); // Change color from green to yellow
        checkOrderAnswer();
    }

    let orderScore = 0;
    function checkOrderAnswer() {
        const sentenceDiv = document.getElementById('sentence');
        const words = Array.from(sentenceDiv.children).map(b => b.textContent);
        const q = orderQuestions[current];
        const feedback = document.getElementById('feedback');
        if (words.length === q.words.length) {
            const userSentence = words.join(' ') + '.';
            if (userSentence === q.answer) {
                feedback.textContent = 'Correct!';
                feedback.style.color = 'green';
                playSound('correct');
                orderScore++;
                document.getElementById('next-btn').style.display = (current < orderQuestions.length - 1) ? 'inline' : 'none';
                if (current === orderQuestions.length - 1) showFinalScore('order');
            } else {
                feedback.textContent = 'Try again!';
                feedback.style.color = 'red';
                playSound('wrong');
                // Reset for retry
                setTimeout(() => {
                    showQuestion();
                    feedback.textContent = '';
                }, 1000);
            }
        } else {
            feedback.textContent = '';
        }
    }
function showFinalScore(modeType) {
    let total = modeType === 'fill' ? fillQuestions.length : orderQuestions.length;
    let score = modeType === 'fill' ? fillScore : orderScore;
    let feedback = document.getElementById('feedback');
    let message = `Your score: ${score} / ${total}. `;
    if (score >= total * 0.8) {
        message += 'Congratulations!';
    } else {
        message += 'Keep practicing!';
    }
    feedback.textContent = message;
    feedback.style.color = score >= total * 0.8 ? 'green' : 'orange';
    document.getElementById('next-btn').style.display = 'none';
}

    function nextQuestion() {
        current++;
        document.getElementById('feedback').textContent = '';
        document.getElementById('next-btn').style.display = 'none';
        showQuestion();
    }

    // Indításkor első kérdés
    window.onload = () => {
        showQuestion();
    };
    </script>
</body>
</html>
