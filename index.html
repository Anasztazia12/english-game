<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Game</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Saját CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>English Game</h1>

    <!-- Kezdő képernyő -->
    <div id="start-area">
        <button class="btn btn-warning btn-lg" onclick="showModeSelect()">Start Game</button>
    </div>

    <!-- Mode választás -->
    <div id="mode-select" style="display:none;">
        <h2>Select Game Mode</h2>
        <button class="btn btn-danger m-2" onclick="chooseMode('fill')">Fill in the blank</button>
        <button class="btn btn-success m-2" onclick="chooseMode('order')">Sentence order</button>
        <div class="mt-3">
            <button class="btn btn-home btn-light" onclick="goHome()">Home</button>
        </div>
    </div>

    <!-- Difficulty választás -->
    <div id="difficulty-select" style="display:none;">
        <h2>Select Difficulty</h2>
        <button class="btn btn-success m-2" onclick="chooseDifficulty('easy')" id="btn-easy">Easy</button>
        <button class="btn btn-danger m-2" onclick="chooseDifficulty('hard')" id="btn-hard">Hard</button>
        <div class="mt-3">
            <button class="btn btn-back btn-light me-2" onclick="backToMode()">Back</button>
            <button class="btn btn-home btn-light" onclick="goHome()">Home</button>
        </div>
    </div>

    <!-- Játékterület -->
    <div id="game-area" style="display:none;"></div>

    <!-- Navigáció -->
    <div id="game-nav" style="display:none;" class="mt-3">
        <button class="btn btn-back btn-light me-2" onclick="backToDifficulty()">Back</button>
        <button class="btn btn-home btn-light" onclick="goHome()">Home</button>
    </div>

    <!-- Feedback -->
    <div id="feedback"></div>

    <!-- Next gomb -->
    <button id="next-btn" class="btn btn-primary mt-3" style="display:none;" onclick="nextQuestion()">Next</button>
</div>

<script>
// ===================== ADATOK =====================
const subjects = ["I", "You", "He", "She", "We", "They", "My brother", "The dog", "Anna", "The children"];
// Objektumokat csoportosítjuk az igékhez
const verbObjects = {
    go: ["to the park", "to school", "home", "to the garden", "to the piano", "with friends", "fast", "well", "every day", "yesterday", "now", "at school", "in the garden", "in the morning"],
    eat: ["a cake", "breakfast", "a letter", "homework"],
    play: ["music", "a song", "the piano", "the ball", "with friends", "in the garden"],
    read: ["a book", "a letter", "homework", "at school", "in the morning"],
    have: ["breakfast", "a book", "homework", "a cake", "a letter", "music", "a song", "the ball", "the piano", "friends"],
    like: ["music", "a book", "breakfast", "a song", "the ball", "the piano", "a letter", "the park", "friends", "playing", "reading", "eating", "going"]
};
const objects = Array.from(new Set(Object.values(verbObjects).flat()));
const verbs = [
    { base: "go", present: ["go","goes"], ing:"going", past:"went" },
    { base: "eat", present:["eat","eats"], ing:"eating", past:"ate" },
    { base:"play", present:["play","plays"], ing:"playing", past:"played" },
    { base:"read", present:["read","reads"], ing:"reading", past:"read" },
    { base:"have", present:["have","has"], ing:"having", past:"had" },
    { base:"like", present:["like","likes"], ing:"liking", past:"liked" }
];
const colors = ["primary", "success", "danger", "warning", "info"];

let mode = 'fill';
let difficulty = 'easy';
let fillQuestions = [];
let orderQuestions = [];
let current = 0;
let fillScore = 0;
let orderScore = 0;

// ===================== SEGÉD FUNKCIÓK =====================
function showModeSelect() {
    document.getElementById('start-area').style.display='none';
    document.getElementById('mode-select').style.display='';
    document.getElementById('difficulty-select').style.display='none';
    document.getElementById('game-area').style.display='none';
    document.getElementById('game-nav').style.display='none';
    document.getElementById('feedback').textContent='';
    document.getElementById('next-btn').style.display='none';
}

function chooseMode(selectedMode) {
    mode = selectedMode;
    document.getElementById('mode-select').style.display='none';
    document.getElementById('difficulty-select').style.display='';
}

function chooseDifficulty(newDiff) {
    difficulty = newDiff;
    fillQuestions = generateFillQuestions(difficulty);
    orderQuestions = generateOrderQuestions(difficulty);
    current = 0;
    fillScore = 0;
    orderScore = 0;
    document.getElementById('difficulty-select').style.display='none';
    document.getElementById('game-area').style.display='';
    document.getElementById('game-nav').style.display='';
    showQuestion();
}

function goHome() {
    document.getElementById('start-area').style.display='';
    document.getElementById('mode-select').style.display='none';
    document.getElementById('difficulty-select').style.display='none';
    document.getElementById('game-area').style.display='none';
    document.getElementById('game-nav').style.display='none';
    document.getElementById('feedback').textContent='';
    document.getElementById('next-btn').style.display='none';
}

function backToMode() { document.getElementById('difficulty-select').style.display='none'; document.getElementById('mode-select').style.display=''; document.getElementById('game-area').style.display='none'; document.getElementById('game-nav').style.display='none'; }
function backToDifficulty() { document.getElementById('game-area').style.display='none'; document.getElementById('game-nav').style.display='none'; document.getElementById('difficulty-select').style.display=''; }

// ===================== KÉRDÉSEK GENERÁLÁSA =====================
function generateFillQuestions(difficulty) {
    let questions = [];
    // subject-verb-object logikus párosítások
    const allowed = [
        {subj: ["I","You","He","She","We","They"], verbs: ["go","eat","play","read","have","like"]},
        {subj: ["My brother","Anna"], verbs: ["eat","play","read","have","like"]},
        {subj: ["The dog"], verbs: ["eat","play","have"]},
        {subj: ["The children"], verbs: ["play","read","have","like"]}
    ];
    for (let i=0;i<20;i++){
        let subj, verb, obj;
        let valid = false;
        while (!valid) {
            subj = subjects[Math.floor(Math.random()*subjects.length)];
            verb = verbs[Math.floor(Math.random()*verbs.length)];
            // csak olyan objektumot válasszunk, ami az adott igéhez értelmes
            const possibleObjs = verbObjects[verb.base];
            obj = possibleObjs[Math.floor(Math.random()*possibleObjs.length)];
            valid = allowed.some(rule => rule.subj.includes(subj) && rule.verbs.includes(verb.base));
        }
        const answer = (["He","She","Anna","My brother","The dog"].includes(subj) ? verb.present[1]:verb.present[0]);
        const options = new Set([answer]);
        while(options.size<3){
            const forms = [verb.base, verb.past, verb.ing, verb.present[0], verb.present[1]];
            options.add(forms[Math.floor(Math.random()*forms.length)]);
        }
        // vonal a hiányzó szó helyén
        questions.push({sentence:`${subj} <span class='blank-line'></span> ${obj}.`, options:Array.from(options), answer});
    }
    return questions;
}

function generateOrderQuestions(difficulty) {
    let questions = [];
    // subject-verb-object logikus párosítások
    const allowed = [
        {subj: ["I","You","He","She","We","They"], verbs: ["go","eat","play","read","have","like"]},
        {subj: ["My brother","Anna"], verbs: ["eat","play","read","have","like"]},
        {subj: ["The dog"], verbs: ["eat","play","have"]},
        {subj: ["The children"], verbs: ["play","read","have","like"]}
    ];
    for (let i=0;i<20;i++){
        let subj, verb, obj;
        let valid = false;
        while (!valid) {
            subj = subjects[Math.floor(Math.random()*subjects.length)];
            let verbObj = verbs[Math.floor(Math.random()*verbs.length)];
            verb = verbObj.base;
            // csak olyan objektumot válasszunk, ami az adott igéhez értelmes
            const possibleObjs = verbObjects[verb];
            obj = possibleObjs[Math.floor(Math.random()*possibleObjs.length)];
            valid = allowed.some(rule => rule.subj.includes(subj) && rule.verbs.includes(verb));
        }
        const sentence = `${subj} ${verb} ${obj}.`;
        const words = sentence.replace('.','').split(' ');
        questions.push({words, answer:sentence});
    }
    return questions;
}

// ===================== MEGJELENÍTÉS =====================
function showQuestion(){
    const area = document.getElementById('game-area');
    area.innerHTML='';
    const btnColors = [...colors].sort(()=>Math.random()-0.5);

    if(mode==='fill'){
        const q = fillQuestions[current];
        const sentence = q.sentence.replace('___','<span id="blank"></span>');
        area.innerHTML=`<p>${sentence}</p>`;
        q.options.forEach((opt,i)=>{
            const btn=document.createElement('button');
            btn.textContent=opt;
            btn.className="btn btn-"+btnColors[i]+" m-2";
            btn.onclick=()=>checkFillAnswer(opt);
            area.appendChild(btn);
        });
    } else if(mode==='order'){
        const q = orderQuestions[current];
        const shuffled = [...q.words].sort(()=>Math.random()-0.5);
        area.innerHTML='<div id="word-bank"></div><div id="sentence"></div>';
        const bank = document.getElementById('word-bank');
        shuffled.forEach((word,i)=>{
            const btn=document.createElement('button');
            btn.textContent=word;
            btn.className="btn btn-"+btnColors[i]+" m-2";
            btn.onclick=()=>pickWord(btn);
            bank.appendChild(btn);
        });
    }
}

function checkFillAnswer(selected){
    const q = fillQuestions[current];
    const feedback = document.getElementById('feedback');
    if(selected===q.answer){
        feedback.textContent='Correct!';
        feedback.style.color='green';
        fillScore++;
        document.getElementById('next-btn').style.display=(current<fillQuestions.length-1)?'inline':'none';
        if(current===fillQuestions.length-1) showFinalScore('fill');
    } else {
        feedback.textContent='Try again!';
        feedback.style.color='red';
        return;
    }
}

function pickWord(btn){
    const sentenceDiv=document.getElementById('sentence');
    sentenceDiv.append(btn);
    btn.onclick=null;
    btn.style.margin='0 4px';
    btn.classList.remove('btn-outline-success');
    btn.classList.add('btn-warning');
    checkOrderAnswer();
}

function checkOrderAnswer(){
    const sentenceDiv=document.getElementById('sentence');
    const words=Array.from(sentenceDiv.children).map(b=>b.textContent);
    const q=orderQuestions[current];
    const feedback=document.getElementById('feedback');
    if(words.length===q.words.length){
        const userSentence=words.join(' ') + '.';
        if(userSentence===q.answer){
            feedback.textContent='Correct!';
            feedback.style.color='green';
            orderScore++;
            document.getElementById('next-btn').style.display=(current<orderQuestions.length-1)?'inline':'none';
            if(current===orderQuestions.length-1) showFinalScore('order');
        } else {
            feedback.textContent='Try again!';
            feedback.style.color='red';
            setTimeout(()=>{ showQuestion(); feedback.textContent=''; },1000);
        }
    } else { feedback.textContent=''; }
}

function showFinalScore(modeType){
    const total = (modeType==='fill')?fillQuestions.length:orderQuestions.length;
    const score = (modeType==='fill')?fillScore:orderScore;
    const feedback = document.getElementById('feedback');
    let message = `Your score: ${score} / ${total}. `;
    message += (score>=total*0.8)?'Congratulations!':'Keep practicing!';
    feedback.textContent=message;
    feedback.style.color=(score>=total*0.8)?'green':'orange';
    document.getElementById('next-btn').style.display='none';
}

function nextQuestion(){ current++; document.getElementById('feedback').textContent=''; document.getElementById('next-btn').style.display='none'; showQuestion(); }

window.onload = () => goHome();
</script>

</body>
</html>
