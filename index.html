<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Game</title>
<link rel="icon" href="data:,">

<!-- Bootstrap -->
<link href="assets/vendor/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>English Game</h1>

    <!-- home screen -->
    <div id="start-area">
        <button class="btn btn-warning btn-lg" onclick="showModeSelect()">Start Game</button>
    </div>

    <!-- Mode selection -->
    <div id="mode-select" style="display:none;">
        <h2>Select Game Mode</h2>
        <button class="btn btn-danger m-2" onclick="chooseMode('fill')">Fill in the blank</button>
        <button class="btn btn-success m-2" onclick="chooseMode('order')">Sentence order</button>
        <div class="mt-3">
            <button class="btn btn-home btn-outline-info" onclick="goHome()">Home</button>
        </div>
    </div>

    <!-- Difficulty  -->
    <div id="difficulty-select" style="display:none;">
        <h2>Select Difficulty</h2>
        <button class="btn btn-success m-2" onclick="chooseDifficulty('easy')" id="btn-easy">Easy</button>
        <button class="btn btn-warning m-2" onclick="chooseDifficulty('medium')" id="btn-medium">Medium</button>
        <button class="btn btn-danger m-2" onclick="chooseDifficulty('hard')" id="btn-hard">Hard</button>
        <div class="mt-3">
            <button class="btn btn-back btn-outline-warning" onclick="backToMode()">Back</button>
            <button class="btn btn-home btn-outline-info" onclick="goHome()">Home</button>
        </div>
    </div>


    <!-- Game area -->
    <div id="game-area" style="display:none;"></div>
    <!-- Navigation -->
    <div id="game-nav" style="display:none;" class="mt-3">
        <button class="btn btn-back btn-outline-warning" onclick="backToDifficulty()">Back</button>
        <button class="btn btn-home btn-outline-info" onclick="goHome()">Home</button>
    </div>
    <!-- Feedback -->
    <div id="feedback"></div>
    <!-- Next gomb -->
    <button id="next-btn" class="btn btn-primary mt-3" style="display:none;" onclick="nextQuestion()">Next</button>
</div>

<script src="js/english-game.js"></script>
</body>
</html>
